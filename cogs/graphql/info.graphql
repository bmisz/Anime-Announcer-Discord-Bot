query ($id: Int) {
  Media (id: $id, type: ANIME) {
    coverImage {
      large
    }
    averageScore
    description
    startDate {
      day
      month
      year
    }
    title {
      english
      romaji
    }
    synonyms
    # Next airing returns NoneType if show is finished
    nextAiringEpisode {
      airingAt
    }
  }
}